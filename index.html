<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reporte Toma de Fuerza</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="header">
        <h1>Reporte de Toma de Fuerza</h1>
        <div class="sub">Unidades de grupos AUX/FMS con viajes, km totales y activaciones</div>
      </div>

      <div class="filters">
        <div class="field">
          <label for="startDate">Fecha inicio</label>
          <input id="startDate" type="date" />
        </div>

        <div class="field">
          <label for="endDate">Fecha fin</label>
          <input id="endDate" type="date" />
        </div>

        <div class="field">
          <label for="sourceFilter">Tipo toma de fuerza</label>
          <select id="sourceFilter">
            <option value="all" selected>Todos</option>
            <option value="aux">AUX</option>
            <option value="fms">FMS</option>
          </select>
        </div>

        <div class="field">
          <label for="minKm">Km minimos (viajes)</label>
          <input id="minKm" type="number" min="0" step="1" value="0" />
        </div>

        <div class="field">
          <label>&nbsp;</label>
          <button id="refreshBtn" type="button">Actualizar</button>
        </div>
      </div>

      <div id="status" class="status"></div>

      <div style="overflow:auto;">
        <table>
          <thead>
            <tr>
              <th>Unidad</th>
              <th>Tipo</th>
              <th>Medicion</th>
              <th># Viajes</th>
              <th>Km total</th>
              <th># Activaciones</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>

      <div id="empty" class="empty" style="display:none;">No hay resultados con los filtros seleccionados.</div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
