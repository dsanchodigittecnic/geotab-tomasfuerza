<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reporte Toma de Fuerza</title>
  <style>
    :root {
      --bg: #f6f8fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #0f766e;
      --border: #d1d5db;
      --danger: #b91c1c;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, sans-serif;
      background: linear-gradient(120deg, #f0fdfa 0%, #eef2ff 100%);
      color: var(--text);
      padding: 20px;
    }

    .wrap { max-width: 1200px; margin: 0 auto; }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
      overflow: hidden;
    }

    .header {
      padding: 18px 20px;
      border-bottom: 1px solid var(--border);
    }

    h1 {
      margin: 0;
      font-size: 20px;
      font-weight: 700;
    }

    .sub {
      margin-top: 6px;
      color: var(--muted);
      font-size: 13px;
    }

    .filters {
      display: grid;
      grid-template-columns: repeat(5, minmax(120px, 1fr));
      gap: 10px;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      background: #fcfcfd;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 0;
    }

    label {
      font-size: 12px;
      color: var(--muted);
      font-weight: 600;
    }

    input, select, button {
      min-height: 36px;
      border-radius: 8px;
      border: 1px solid var(--border);
      font-size: 14px;
      padding: 7px 10px;
      background: #fff;
      color: var(--text);
    }

    button {
      background: var(--primary);
      color: #fff;
      font-weight: 600;
      border: none;
      cursor: pointer;
      margin-top: auto;
    }

    button:disabled {
      opacity: 0.65;
      cursor: wait;
    }

    .status {
      padding: 12px 20px;
      font-size: 13px;
      color: var(--muted);
      min-height: 40px;
    }

    .status.error {
      color: var(--danger);
      font-weight: 600;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    th, td {
      text-align: left;
      padding: 12px 14px;
      border-top: 1px solid var(--border);
      vertical-align: top;
    }

    th {
      background: #f9fafb;
      font-size: 12px;
      letter-spacing: 0.02em;
      color: #374151;
      text-transform: uppercase;
    }

    td.num {
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .empty {
      padding: 18px 20px;
      color: var(--muted);
    }

    @media (max-width: 980px) {
      .filters { grid-template-columns: repeat(2, minmax(120px, 1fr)); }
    }

    @media (max-width: 580px) {
      .filters { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="header">
        <h1>Reporte de Toma de Fuerza</h1>
        <div class="sub">Unidades de grupos AUX/FMS con viajes, km totales y activaciones</div>
      </div>

      <div class="filters">
        <div class="field">
          <label for="startDate">Fecha inicio</label>
          <input id="startDate" type="date" />
        </div>

        <div class="field">
          <label for="endDate">Fecha fin</label>
          <input id="endDate" type="date" />
        </div>

        <div class="field">
          <label for="sourceFilter">Tipo toma de fuerza</label>
          <select id="sourceFilter">
            <option value="all" selected>Todos</option>
            <option value="aux">AUX</option>
            <option value="fms">FMS</option>
          </select>
        </div>

        <div class="field">
          <label for="minKm">Km minimos (viajes)</label>
          <input id="minKm" type="number" min="0" step="1" value="0" />
        </div>

        <div class="field">
          <label>&nbsp;</label>
          <button id="refreshBtn" type="button">Actualizar</button>
        </div>
      </div>

      <div id="status" class="status"></div>

      <div style="overflow:auto;">
        <table>
          <thead>
            <tr>
              <th>Unidad</th>
              <th>Tipo</th>
              <th>Medicion</th>
              <th># Viajes</th>
              <th>Km total</th>
              <th># Activaciones</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>

      <div id="empty" class="empty" style="display:none;">No hay resultados con los filtros seleccionados.</div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
